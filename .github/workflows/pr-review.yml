name: Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Pull Request Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are an expert code reviewer. Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## Instructions

            1. Get the PR diff using: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Get PR context using: `gh pr view ${{ github.event.pull_request.number }}`
            3. Review the code thoroughly
            4. Post inline comments on specific issues using the inline comment tool
            5. Post a summary comment using: `gh pr comment ${{ github.event.pull_request.number }} --body "..."`

            ## Review Output Format

            ### Summary Comment (post via gh pr comment)

            ```
            ## PR Review

            **Score: X/10**

            ### Summary
            2-3 sentences on what this PR does and overall assessment.

            ### Score Breakdown
            | Category | Score | Note |
            |----------|-------|------|
            | Code Quality | X/10 | ... |
            | Security | X/10 | ... |
            | Performance | X/10 | ... |
            | Maintainability | X/10 | ... |

            ### Issues Found
            🔴 **Critical**: X | 🟠 **Important**: X | 🟡 **Suggestions**: X

            [Details posted as inline comments]

            ### What's Good
            - Brief highlights (if any)
            ```

            ### Inline Comments (post via inline comment tool)

            For each issue found, post an inline comment on the relevant line(s):

            **Critical Issues (🔴 must fix before merge):**
            - Security vulnerabilities, logic errors, bugs, data corruption risks, race conditions

            **Important Issues (🟠 should fix):**
            - Performance problems, error handling gaps, edge cases, potential null/undefined

            **Suggestions (🟡 nice to have):**
            - Naming improvements, simplification opportunities, minor style issues

            Format inline comments as:
            ```
            🔴 **[CRITICAL]** / 🟠 **[IMPORTANT]** / 🟡 **[SUGGESTION]**: Title

            **Problem:** What's wrong
            **Fix:** Suggested solution
            ```

            ## Review Guidelines

            - Focus on substance, not style nitpicks
            - Be concise - one clear point per comment
            - Only flag real issues with actual impact
            - Tests are not required for this project
            - Don't pad with false praise

            ## Score Reference

            **Overall (1-10):** 9-10 ship it, 7-8 approve with comments, 5-6 needs work, 3-4 request changes, 1-2 major problems

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"